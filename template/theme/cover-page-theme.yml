# 표지 서식
title-page:
  background-image: image:cover-page.png[fill=none,pdfwidth=100%,position=top center]
  text-align: left

  title:
    top: 40%
    font-style: bold
    font-size: 30
    font-color: '000000'
      
  authors:
    content: '{info-final-editor}, {info-authors}'
    font-size: 16
    font-color: '659ADD'

  revision: 
    delimiter: ' / '
    font-size: 16
    font-color: '659ADD'

  subtitle:
    font-style: bold
    font-size: 20
    font-color: '000000'

# 속표지 서식
role:
  abstract-title:
    font-style: bold
    font-size: 23
    font-color: '000000'
    margin-top: 12
    margin-bottom: 4
  abstract-subtitle:
    font-size: 18
    font-color: '659ADD'
    margin-top: 4
    margin-bottom: 12
  